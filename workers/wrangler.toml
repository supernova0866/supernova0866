# wrangler.toml - Cloudflare Worker configuration file

name = "supernovae-api"
main = "worker.ts"
compatibility_date = "2024-03-01"

# Environment Variables (Non-Sensitive)
[vars]
GITHUB_USERNAME = "supernova0866"
LASTFM_USERNAME = "your-username"
TURSO_URL = "libsql://oblitus-nova0866.aws-us-east-1.turso.io"
SITE_URL = "https://supernovae0866.pages.dev"

# Secrets (upload via: cd workers && npx wrangler secret put <NAME>)
# - GITHUB_PAT
# - GITHUB_CLIENT_ID
# - GITHUB_CLIENT_SECRET
# - LASTFM_API_KEY
# - TURSO_AUTH_TOKEN

# Cloudflare KV Binding
[[kv_namespaces]]
binding = "KV"
id = "8ed6799434364b5a98078bd2f86bc5bb"

# Cloudflare D1 Database Binding
[[d1_databases]]
binding = "DB"
database_name = "supernovae-db"
database_id = "4ce37303-cbdb-4649-9d22-4b7752e82175"
