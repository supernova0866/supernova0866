<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nova // gatekeeper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;800;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap');

  :root {
    --black: #000000;
    --white: #ffffff;
    --dim: rgba(255,255,255,0.35);
    --dimmer: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.06);
    --glow-soft: 0 0 18px rgba(255,255,255,0.05);
    --glow-hover: 0 0 28px rgba(255,255,255,0.15);
    --font-sans: 'Inter', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Custom Scrollbar */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--black);
  }
  ::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 255, 255, 0.3);
  }
  * {
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 255, 255, 0.15) var(--black);
  }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-sans);
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── noise texture overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9990;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    opacity: .6;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2.5rem;
    width: 100%;
    max-width: 420px;
    text-align: center;
    box-shadow: var(--glow-soft);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    animation: fadeUp .6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo-text {
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: -.03em;
    color: var(--white);
    text-transform: lowercase;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 40px rgba(255,255,255,0.15);
  }

  .sub-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 12px 24px;
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .btn-github {
    background: var(--white);
    color: var(--black);
    border: none;
  }

  .btn-github:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(255,255,255,0.2);
  }

  .github-icon {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .footer-note {
    font-family: var(--font-mono);
    font-size: 9px;
    color: rgba(255,255,255,0.15);
    margin-top: 2rem;
    letter-spacing: 0.08em;
  }

  .footer-note a {
    color: inherit;
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo-text">nova.auth</div>
  <div class="sub-text">private control panel login</div>

  <button class="btn btn-github" id="login-btn">
    <svg class="github-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
    </svg>
    authenticate with github
  </button>

  <div class="footer-note">
    return to <a href="/">main site</a> · <a href="/oblitus">oblitus</a>
  </div>
</div>

<script>
  document.getElementById('login-btn').addEventListener('click', () => {
    window.location.href = '/nova/auth/login';
  });

  // Print console brand
  if (window.NovaConsole) {
    // Loaded optionally
  }
</script>
<script src="/nova/devtools.js"></script>
</body>
</html>
